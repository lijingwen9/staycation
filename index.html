<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>梦境集邮</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#e8f4f8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="./icon-192.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#F0FFFF;color:#222;min-height:100vh}
header{display:flex;align-items:center;justify-content:space-between;padding:16px;gap:12px;flex-wrap:wrap}
.title-area{display:flex;align-items:center;gap:8px;flex:1}
.title-name{font-size:1.2em;font-weight:bold;min-width:40px;outline:none;border-bottom:1px dashed #999;padding:2px 4px;cursor:text}
.title-name:empty::before{content:attr(data-placeholder);color:#aaa}
.title-suffix{font-size:1.2em;font-weight:bold}
.title-color-picker{width:28px;height:28px;border:none;background:none;cursor:pointer;border-radius:50%}
.avatar-area{position:relative;width:48px;height:48px;border-radius:50%;overflow:hidden;cursor:pointer;background:#cde;flex-shrink:0}
.avatar-area img{width:100%;height:100%;object-fit:cover}
.avatar-area::after{content:"📷";position:absolute;bottom:0;left:0;right:0;text-align:center;font-size:10px;background:rgba(0,0,0,0.4);opacity:0;transition:opacity .2s}
.avatar-area:hover::after{opacity:1}
nav{display:flex;gap:8px;padding:0 16px 12px;overflow-x:auto;-webkit-overflow-scrolling:touch}
nav button{padding:8px 16px;border:1px solid #bbb;background:#fff;color:#333;border-radius:20px;cursor:pointer;white-space:nowrap;font-size:14px;transition:all .2s}
nav button.active{background:#FFD700;color:#000;border-color:#FFD700;font-weight:bold}
main{padding:0 16px 80px}
.hotel-table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.hotel-table th,.hotel-table td{padding:12px 14px;text-align:left;border-bottom:1px solid #eee;vertical-align:top;font-size:14px}
.hotel-table th{background:#f5f5f5;font-weight:bold;position:sticky;top:0}
.hotel-table .tier-cell{font-weight:bold;color:#666;white-space:nowrap;background:#fafafa}
.brand-item{padding:4px 0;cursor:pointer;display:flex;align-items:center;gap:8px;border-radius:4px;transition:background .15s}
.brand-item:hover{background:#f0f0f0}
.brand-dot{width:10px;height:10px;border-radius:50%;background:#ccc;flex-shrink:0;transition:all .3s}
.brand-dot.lit{background:#FFEA00;box-shadow:0 0 8px #FFEA0088}
.group-card{background:#fff;border:1px solid #eee;border-radius:12px;margin-bottom:16px;overflow:hidden}
.group-card h3{padding:12px 16px;background:#f5f5f5;font-size:15px}
.brand-row{display:flex;align-items:center;padding:10px 16px;cursor:pointer;transition:background .15s;gap:10px}
.brand-row:hover{background:#f5f5f5}
.brand-name{flex:1;font-size:14px}
.brand-note-tag{font-size:11px;color:#666;background:#f0f0f0;padding:2px 8px;border-radius:10px;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tier-label{padding:8px 16px;font-size:12px;color:#888;background:#fafafa;font-weight:bold;border-top:1px solid #eee}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;align-items:center;justify-content:center;padding:16px}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:12px;padding:24px;width:100%;max-width:400px;position:relative;color:#222}
.modal h3{margin-bottom:16px;font-size:16px}
.modal .lit-badge{display:inline-block;background:#FFD700;color:#000;padding:4px 12px;border-radius:12px;font-size:12px;font-weight:bold;margin-bottom:12px}
.modal textarea{width:100%;height:80px;background:#f9f9f9;border:1px solid #ddd;border-radius:8px;color:#222;padding:10px;font-size:14px;resize:vertical}
.modal .actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
.modal button{padding:8px 20px;border:none;border-radius:8px;cursor:pointer;font-size:14px}
.btn-primary{background:#FFD700;color:#000;font-weight:bold}
.btn-secondary{background:#eee;color:#333}
.modal-close{position:absolute;top:12px;right:16px;background:none;border:none;color:#888;font-size:20px;cursor:pointer}
@media(max-width:600px){.hotel-table{display:block;overflow-x:auto} .hotel-table th,.hotel-table td{font-size:12px;padding:8px 6px}}
</style>
</head>
<body>
<header>
  <div class="title-area">
    <span class="title-name" contenteditable="true" id="userName"></span>
    <span class="title-suffix">的梦境集邮</span>
    <input type="color" class="title-color-picker" id="titleColor" value="#e0e0e0">
  </div>
  <div class="avatar-area" id="avatarArea">
    <img id="avatarImg" src="" alt="">
    <input type="file" accept="image/*" id="avatarInput" style="display:none">
  </div>
</header>
<nav id="tabs"></nav>
<main id="content"></main>
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal"></div>
</div>
<script>
const HOTEL_DATA=[
{group:"万豪",groupEn:"Marriott",tiers:[
{name:"奢华",brands:["丽思卡尔顿隐世","宝格丽酒店","丽思卡尔顿","艾迪逊","瑞吉"]},
{name:"豪华",brands:["豪华精选","W酒店","JW万豪"]},
{name:"高端",brands:["万豪","喜来登","威斯汀","万丽","艾美","傲途格"]}
]},
{group:"洲际",groupEn:"IHG",tiers:[
{name:"奢华",brands:["六善","丽晶","金普顿"]},
{name:"豪华",brands:["洲际","英迪格"]},
{name:"高端",brands:["皇冠假日","华邑","voco"]}
]},
{group:"希尔顿",groupEn:"Hilton",tiers:[
{name:"奢华",brands:["华尔道夫"]},
{name:"豪华",brands:["康莱德","嘉悦里"]},
{name:"高端",brands:["希尔顿"]}
]},
{group:"凯悦",groupEn:"Hyatt",tiers:[
{name:"奢华",brands:["柏悦"]},
{name:"豪华",brands:["安达仕","君悦","阿丽拉"]},
{name:"高端",brands:["凯悦"]}
]},
{group:"雅高",groupEn:"Accor",tiers:[
{name:"奢华",brands:["莱佛士","悦榕庄","索菲特传奇"]},
{name:"豪华",brands:["费尔蒙","索菲特"]},
{name:"高端",brands:["铂尔曼"]}
]}
];

const UNDERLINED=new Set(["丽思卡尔顿隐世","宝格丽酒店","六善"]);

let checkins=JSON.parse(localStorage.getItem("staycation_checkins")||"{}");
let user=JSON.parse(localStorage.getItem("staycation_user")||'{"name":"","avatar":"","titleColor":"#e0e0e0"}');
let activeTab="全部";

const $=id=>document.getElementById(id);
const saveCheckins=()=>localStorage.setItem("staycation_checkins",JSON.stringify(checkins));
const saveUser=()=>localStorage.setItem("staycation_user",JSON.stringify(user));
const isLit=(group,brand)=>checkins[`${group}_${brand}`]?.lit;
const getNote=(group,brand)=>checkins[`${group}_${brand}`]?.note||"";

function init(){
  $("userName").textContent=user.name||"";
  $("userName").setAttribute("data-placeholder","输入昵称");
  $("userName").style.color=user.titleColor;
  document.querySelector(".title-suffix").style.color=user.titleColor;
  $("titleColor").value=user.titleColor;
  if(user.avatar)$("avatarImg").src=user.avatar;

  $("userName").addEventListener("blur",()=>{
    user.name=$("userName").textContent.trim();saveUser();
  });
  $("userName").addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();$("userName").blur();}});
  $("titleColor").addEventListener("input",e=>{
    user.titleColor=e.target.value;
    $("userName").style.color=user.titleColor;
    document.querySelector(".title-suffix").style.color=user.titleColor;
    saveUser();
  });
  $("avatarArea").addEventListener("click",()=>$("avatarInput").click());
  $("avatarInput").addEventListener("change",handleAvatar);
  $("modalOverlay").addEventListener("click",e=>{if(e.target===$("modalOverlay"))closeModal();});

  renderTabs();
  render();
}

function handleAvatar(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement("canvas");c.width=128;c.height=128;
      const ctx=c.getContext("2d");
      const s=Math.min(img.width,img.height);
      const sx=(img.width-s)/2,sy=(img.height-s)/2;
      ctx.drawImage(img,sx,sy,s,s,0,0,128,128);
      user.avatar=c.toDataURL("image/jpeg",0.8);
      $("avatarImg").src=user.avatar;saveUser();
    };img.src=ev.target.result;
  };reader.readAsDataURL(file);
}

function renderTabs(){
  const tabs=["全部",...HOTEL_DATA.map(g=>g.group)];
  $("tabs").innerHTML=tabs.map(t=>`<button class="${t===activeTab?"active":""}" data-tab="${t}">${t}</button>`).join("");
  $("tabs").addEventListener("click",e=>{
    if(e.target.tagName==="BUTTON"){activeTab=e.target.dataset.tab;renderTabs();render();}
  });
}

function render(){
  if(activeTab==="全部")renderAll();
  else renderGroup(HOTEL_DATA.find(g=>g.group===activeTab));
}

function renderAll(){
  const tiers=HOTEL_DATA[0].tiers.map(t=>t.name);
  let html=`<table class="hotel-table"><thead><tr><th></th>`;
  HOTEL_DATA.forEach(g=>{html+=`<th>${g.group} ${g.groupEn}</th>`;});
  html+=`</tr></thead><tbody>`;
  tiers.forEach((tier,ti)=>{
    html+=`<tr><td class="tier-cell">${tier}</td>`;
    HOTEL_DATA.forEach(g=>{
      const brands=g.tiers[ti]?.brands||[];
      html+=`<td>${brands.map(b=>`<div class="brand-item ${UNDERLINED.has(b)?"starred":""}" data-group="${g.group}" data-brand="${b}"><div class="brand-dot ${isLit(g.group,b)?"lit":""}"></div>${UNDERLINED.has(b)?"⭐ ":""}${b}</div>`).join("")}</td>`;
    });
    html+=`</tr>`;
  });
  html+=`</tbody></table>`;
  $("content").innerHTML=html;
  $("content").querySelectorAll(".brand-item").forEach(r=>r.addEventListener("click",()=>openModal(r.dataset.group,r.dataset.brand)));
}
function renderGroup(g){
  const brandList=g.tiers.map(t=>`<div class="tier-label">${t.name}</div>`+
    t.brands.map(b=>{
      const note=getNote(g.group,b);
      return `<div class="brand-row" data-group="${g.group}" data-brand="${b}">
        <div class="brand-dot ${isLit(g.group,b)?"lit":""}"></div>
        <div class="brand-name">${b}</div>
        ${note?`<div class="brand-note-tag">${note}</div>`:""}
      </div>`;
    }).join("")
  ).join("");
  $("content").innerHTML=`<div class="group-card">${brandList}</div>`;
  $("content").querySelectorAll(".brand-row").forEach(r=>r.addEventListener("click",()=>openModal(r.dataset.group,r.dataset.brand)));
}

function openModal(group,brand){
  const key=`${group}_${brand}`;
  const data=checkins[key]||{lit:false,note:""};
  $("modal").innerHTML=`
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h3>${brand}</h3>
    ${data.lit?`<div class="lit-badge">✨ 已点亮</div>`:""}
    <textarea id="noteInput" placeholder="添加备注...">${data.note||""}</textarea>
    <div class="actions">
      <button class="btn-secondary" onclick="closeModal()">取消</button>
      <button class="btn-primary" onclick="saveModal('${group}','${brand}')">${data.lit?"保存修改":"点亮 ✨"}</button>
    </div>`;
  $("modalOverlay").classList.add("show");
}

function closeModal(){$("modalOverlay").classList.remove("show");}

function saveModal(group,brand){
  const key=`${group}_${brand}`;
  checkins[key]={lit:true,note:$("noteInput").value.trim(),date:new Date().toISOString().slice(0,10)};
  saveCheckins();closeModal();render();
}

if("serviceWorker"in navigator)navigator.serviceWorker.register("./sw.js");
init();
</script>
</body>
</html>
